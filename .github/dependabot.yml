# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for more information:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
# https://containers.dev/guide/dependabot

version: 2
updates:
  # Cargo dependencies in workspace root.
  # All external deps live in [workspace.dependencies]; Dependabot updates here.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "runtimed/maintainers"
    open-pull-requests-limit: 20

  # Python packages for development environment and CI.
  # Tracked in .github/requirements.txt (jupyter, ipykernel, nbclient).
  - package-ecosystem: "pip"
    directory: "/.github"
    schedule:
      interval: "weekly"
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "runtimed/maintainers"

  # Dev container configuration and dependencies.
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
    pull-request-branch-name:
      separator: "/"
